server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # --- Security headers ---
  # Content-Security-Policy is the main mitigation for the localStorage-stored
  # JWT: it blocks injected/inline scripts from running (and thus from reading
  # the token). 'unsafe-inline' is required only for styles (MUI/Emotion inject
  # <style> tags); scripts are bundled, so script-src stays strict.
  # NOTE: connect-src must list the API origin — keep it in sync with the
  # frontend build's VITE_API_BASE_URL (default http://localhost:3001).
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' http://localhost:3001; frame-ancestors 'none'; form-action 'self'; object-src 'none'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # SPA fallback: serve index.html for client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
